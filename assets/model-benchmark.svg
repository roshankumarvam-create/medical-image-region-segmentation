<svg viewBox="0 0 1080 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="1080" height="470" rx="16" fill="#fbfcfe" stroke="#e3e8ee"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#16324f">Three Architectures, Benchmarked Head-to-Head</text>
  <text x="32" y="68" font-size="13" fill="#5b6b7b">Same task, same data splits — compared on mean IoU, per-class IoU, and rare-region recall</text>

  <!-- Column 1: Mask2Former -->
  <g>
    <rect x="32" y="92" width="330" height="350" rx="14" fill="#ffffff" stroke="#cfd8e3"/>
    <rect x="32" y="92" width="330" height="50" rx="14" fill="#eef4ff" stroke="#9db8e8"/>
    <text x="197" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#1e497d">Model 1 — Mask2Former</text>
    <text x="197" y="134" text-anchor="middle" font-size="11" fill="#5774a0">memory-optimized</text>

    <text x="52" y="174" font-size="12" font-weight="700" fill="#16324f">Encoder–decoder</text>
    <text x="52" y="194" font-size="11.5" fill="#5b6b7b">Residual blocks throughout</text>
    <text x="52" y="212" font-size="11.5" fill="#5b6b7b">Lightweight transformer bottleneck</text>
    <text x="52" y="230" font-size="11.5" fill="#5b6b7b">(depthwise + 1×1 channel-mix)</text>
    <text x="52" y="248" font-size="11.5" fill="#5b6b7b">Attention gates: 32 · 16 · 8</text>

    <text x="52" y="282" font-size="12" font-weight="700" fill="#16324f">Training</text>
    <text x="52" y="302" font-size="11.5" fill="#5b6b7b">256×256 · batch 2 · 50 epochs</text>
    <text x="52" y="320" font-size="11.5" fill="#5b6b7b">Mixed precision (fp16)</text>
    <text x="52" y="338" font-size="11.5" fill="#5b6b7b">Adam 1e-3 + LR reduction</text>
    <text x="52" y="356" font-size="11.5" fill="#5b6b7b">Loss: Focal + Dice</text>
    <text x="52" y="374" font-size="11.5" fill="#5b6b7b">Split 80/10/10</text>

    <rect x="52" y="392" width="290" height="34" rx="8" fill="#f3f6f9" stroke="#e3e8ee"/>
    <text x="197" y="414" text-anchor="middle" font-size="12" fill="#16324f">Goal: fit transformer seg in tight memory</text>
  </g>

  <!-- Column 2: Attention U-Net -->
  <g>
    <rect x="375" y="92" width="330" height="350" rx="14" fill="#ffffff" stroke="#cfd8e3"/>
    <rect x="375" y="92" width="330" height="50" rx="14" fill="#f5eefb" stroke="#c59bdf"/>
    <text x="540" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#6a1b9a">Model 2 — Attention U-Net</text>
    <text x="540" y="134" text-anchor="middle" font-size="11" fill="#7e57a8">+ ASPP + Curriculum</text>

    <text x="395" y="174" font-size="12" font-weight="700" fill="#16324f">Encoder–decoder</text>
    <text x="395" y="194" font-size="11.5" fill="#5b6b7b">U-Net blocks 64→128→256→512</text>
    <text x="395" y="212" font-size="11.5" fill="#5b6b7b">ASPP (1,6,12,18 + GAP)</text>
    <text x="395" y="230" font-size="11.5" fill="#5b6b7b">Attention gates: 256·128·64·32</text>

    <text x="395" y="264" font-size="12" font-weight="700" fill="#16324f">Training</text>
    <text x="395" y="284" font-size="11.5" fill="#5b6b7b">512×512 · batch 1 · fp16</text>
    <text x="395" y="302" font-size="11.5" fill="#5b6b7b">Curriculum: 40 / 40 / 50 epochs</text>
    <text x="395" y="320" font-size="11.5" fill="#5b6b7b">Adam 1e-4 → 6e-5 → 1e-5</text>
    <text x="395" y="338" font-size="11.5" fill="#5b6b7b">Weighted Dice + Weighted CE</text>
    <text x="395" y="356" font-size="11.5" fill="#5b6b7b">Rare oversampling ×5 · split 70/15/15</text>

    <rect x="395" y="392" width="290" height="34" rx="8" fill="#f3eefb" stroke="#e0d0ef"/>
    <text x="540" y="414" text-anchor="middle" font-size="12" font-weight="600" fill="#6a1b9a">IoU 0.592</text>
  </g>

  <!-- Column 3: DeepLabV3+ -->
  <g>
    <rect x="718" y="92" width="330" height="350" rx="14" fill="#ffffff" stroke="#7bccab"/>
    <rect x="718" y="92" width="330" height="50" rx="14" fill="#e7f7f0" stroke="#7bccab"/>
    <text x="883" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#11694a">Model 3 — DeepLabV3+</text>
    <text x="883" y="134" text-anchor="middle" font-size="11" fill="#3c8a6c">ResNet50V2 + Curriculum</text>

    <text x="738" y="174" font-size="12" font-weight="700" fill="#16324f">Encoder–decoder</text>
    <text x="738" y="194" font-size="11.5" fill="#5b6b7b">ResNet50V2 (ImageNet) backbone</text>
    <text x="738" y="212" font-size="11.5" fill="#5b6b7b">ASPP (1,6,12,18 + GAP)</text>
    <text x="738" y="230" font-size="11.5" fill="#5b6b7b">Low-level fusion + 1×1 proj(48)</text>
    <text x="738" y="248" font-size="11.5" fill="#5b6b7b">BatchNorm + Dropout(0.3)</text>

    <text x="738" y="282" font-size="12" font-weight="700" fill="#16324f">Training</text>
    <text x="738" y="302" font-size="11.5" fill="#5b6b7b">512×512 · batch 8</text>
    <text x="738" y="320" font-size="11.5" fill="#5b6b7b">Curriculum: 40 / 40 / 50 epochs</text>
    <text x="738" y="338" font-size="11.5" fill="#5b6b7b">Encoder frozen → progressively unfrozen</text>
    <text x="738" y="356" font-size="11.5" fill="#5b6b7b">Weighted Dice + Weighted CE</text>
    <text x="738" y="374" font-size="11.5" fill="#5b6b7b">Rare oversampling ×5 · split 70/15/15</text>

    <rect x="738" y="392" width="290" height="34" rx="8" fill="#dcf3e8" stroke="#a9dcc4"/>
    <text x="883" y="414" text-anchor="middle" font-size="12" font-weight="700" fill="#11694a">IoU 0.717  — best</text>
  </g>
</svg>
