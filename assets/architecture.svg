<svg viewBox="0 0 1080 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#90a4ae"/>
    </marker>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f6f9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1080" height="380" rx="16" fill="#fbfcfe" stroke="#e3e8ee"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#16324f">Brain Region Auto-Annotation — System Overview</text>
  <text x="32" y="68" font-size="13" fill="#5b6b7b">Serial histology section → multi-class region map → editable annotations a neuroanatomist refines</text>

  <!-- Row 1 -->
  <g>
    <rect x="32" y="106" width="150" height="84" rx="12" fill="url(#g1)" stroke="#cfd8e3"/>
    <text x="107" y="138" text-anchor="middle" font-size="14" font-weight="600" fill="#16324f">Section input</text>
    <text x="107" y="158" text-anchor="middle" font-size="11" fill="#6b7b8c">16-bit TIFF</text>
    <text x="107" y="174" text-anchor="middle" font-size="11" fill="#6b7b8c">Nissl / IHC</text>
  </g>
  <g>
    <rect x="212" y="106" width="170" height="84" rx="12" fill="url(#g1)" stroke="#cfd8e3"/>
    <text x="297" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#16324f">Preprocess</text>
    <text x="297" y="154" text-anchor="middle" font-size="11" fill="#6b7b8c">RGB float · class-index</text>
    <text x="297" y="170" text-anchor="middle" font-size="11" fill="#6b7b8c">resize · augment</text>
  </g>
  <g>
    <rect x="412" y="106" width="190" height="84" rx="12" fill="#eef4ff" stroke="#9db8e8"/>
    <text x="507" y="134" text-anchor="middle" font-size="14" font-weight="700" fill="#1e497d">Region model</text>
    <text x="507" y="154" text-anchor="middle" font-size="11" fill="#5774a0">3 architectures</text>
    <text x="507" y="170" text-anchor="middle" font-size="11" fill="#5774a0">benchmarked</text>
  </g>
  <g>
    <rect x="632" y="106" width="170" height="84" rx="12" fill="url(#g1)" stroke="#cfd8e3"/>
    <text x="717" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#16324f">Region map</text>
    <text x="717" y="154" text-anchor="middle" font-size="11" fill="#6b7b8c">softmax per pixel</text>
    <text x="717" y="170" text-anchor="middle" font-size="11" fill="#6b7b8c">multi-class</text>
  </g>
  <g>
    <rect x="832" y="106" width="216" height="84" rx="12" fill="#f5eefb" stroke="#c59bdf"/>
    <text x="940" y="134" text-anchor="middle" font-size="14" font-weight="700" fill="#6a1b9a">Vectorize → GeoJSON</text>
    <text x="940" y="154" text-anchor="middle" font-size="11" fill="#7e57a8">raster masks → polygons</text>
    <text x="940" y="170" text-anchor="middle" font-size="11" fill="#7e57a8">interoperable export</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="412" y="248" width="190" height="84" rx="12" fill="#fff7ec" stroke="#e8c98f"/>
    <text x="507" y="276" text-anchor="middle" font-size="13" font-weight="700" fill="#9a6a1a">Class-imbalance handling</text>
    <text x="507" y="296" text-anchor="middle" font-size="11" fill="#b08a3c">tiered rare regions</text>
    <text x="507" y="312" text-anchor="middle" font-size="11" fill="#b08a3c">oversampling · weighted loss</text>
  </g>
  <g>
    <rect x="632" y="248" width="170" height="84" rx="12" fill="url(#g1)" stroke="#cfd8e3"/>
    <text x="717" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#16324f">Metrics</text>
    <text x="717" y="302" text-anchor="middle" font-size="11" fill="#6b7b8c">mIoU · per-class IoU</text>
  </g>
  <g>
    <rect x="832" y="248" width="216" height="84" rx="12" fill="#e7f7f0" stroke="#7bccab"/>
    <text x="940" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#11694a">Human-in-the-loop</text>
    <text x="940" y="296" text-anchor="middle" font-size="11" fill="#3c8a6c">OpenSeadragon review</text>
    <text x="940" y="312" text-anchor="middle" font-size="11" fill="#3c8a6c">refine, not redraw</text>
  </g>

  <!-- arrows -->
  <g stroke="#90a4ae" stroke-width="2" fill="none">
    <line x1="182" y1="148" x2="206" y2="148" marker-end="url(#arrow)"/>
    <line x1="382" y1="148" x2="406" y2="148" marker-end="url(#arrow)"/>
    <line x1="602" y1="148" x2="626" y2="148" marker-end="url(#arrow)"/>
    <line x1="802" y1="148" x2="826" y2="148" marker-end="url(#arrow)"/>
    <path d="M507,246 L507,200" marker-end="url(#arrow)"/>
    <path d="M717,190 L717,244" marker-end="url(#arrow)"/>
    <path d="M940,190 L940,244" marker-end="url(#arrow)"/>
  </g>
</svg>
