<svg viewBox="0 0 1040 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#90a4ae"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1040" height="300" rx="16" fill="#fbfcfe" stroke="#e3e8ee"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#4a148c">Automatic Brain-Region Annotation</text>
  <text x="32" y="68" font-size="13" fill="#5b6b7b">Whole-slide section → editable region boundaries → human review</text>

  <g>
    <rect x="32" y="110" width="150" height="84" rx="12" fill="#ffffff" stroke="#cfd8e3"/>
    <text x="107" y="146" text-anchor="middle" font-size="14" font-weight="600" fill="#16324f">Section</text>
    <text x="107" y="167" text-anchor="middle" font-size="11" fill="#6b7b8c">Nissl / IHC</text>

    <rect x="212" y="110" width="170" height="84" rx="12" fill="#eef4ff" stroke="#9db8e8"/>
    <text x="297" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#1e497d">Region model</text>
    <text x="297" y="167" text-anchor="middle" font-size="11" fill="#5774a0">segmentation masks</text>

    <rect x="412" y="110" width="160" height="84" rx="12" fill="#f5eefb" stroke="#c59bdf"/>
    <text x="492" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#6a1b9a">Vectorize</text>
    <text x="492" y="167" text-anchor="middle" font-size="11" fill="#7e57a8">mask → polygons</text>

    <rect x="602" y="110" width="160" height="84" rx="12" fill="#fff4e6" stroke="#e0b07a"/>
    <text x="682" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#9a5b14">GeoJSON</text>
    <text x="682" y="167" text-anchor="middle" font-size="11" fill="#b07a3c">interoperable export</text>

    <rect x="792" y="110" width="216" height="84" rx="12" fill="#e7f7f0" stroke="#7bccab"/>
    <text x="900" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#11694a">OpenSeadragon review</text>
    <text x="900" y="161" text-anchor="middle" font-size="11" fill="#3c8a6c">expert adjusts, not redraws</text>
    <text x="900" y="178" text-anchor="middle" font-size="11" fill="#3c8a6c">→ feeds 3D reconstruction</text>
  </g>

  <g stroke="#90a4ae" stroke-width="2" fill="none">
    <line x1="182" y1="152" x2="206" y2="152" marker-end="url(#a3)"/>
    <line x1="382" y1="152" x2="406" y2="152" marker-end="url(#a3)"/>
    <line x1="572" y1="152" x2="596" y2="152" marker-end="url(#a3)"/>
    <line x1="762" y1="152" x2="786" y2="152" marker-end="url(#a3)"/>
  </g>
</svg>
